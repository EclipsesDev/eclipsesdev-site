<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      
      <title>EclipsesDev - Typing Test</title>

      <link rel="icon" href="/assets/img/favicon.ico" type="image/x-icon">
      <link rel="stylesheet" href="/assets/style.css">
      <link rel="stylesheet" href="/assets/typing-test/app.css">
  </head>
  <body>
    <div class="container">

      <!-- Nav Bar -->
      <nav class="nav-bar">
        <a href="/projects/panel"><button>Back</button></a>
        <a href="/" class="nav-link"><button>Home</button></a>
      </nav>

      <!-- Typing Test Section -->
      <div class="typetest">
        <div class="section">
          <div class="title">Typing Speed Test</div>

          <div id="difficulty-buttons">
            <button class="difficulty-btn active" data-difficulty="easy">Easy</button>
            <button class="difficulty-btn" data-difficulty="medium">Medium</button>
            <button class="difficulty-btn" data-difficulty="hard">Hard</button>
          </div>

          <div class="stats">
            <span>Time: <b id="time">60</b>s</span>
            <span>WPM: <b id="wpm">0</b></span>
            <span>Accuracy: <b id="accuracy">100</b>%</span>
          </div>

          <div id="text-display" class="text-display"></div>

          <input type="text" id="input-field" autocomplete="off" placeholder="Start typing here..." />

          <button id="restart">Restart</button>

        </div>
      </div>

    </div>

    <!-- Script Section -->
    <script src="/assets/typing-test/app.js"></script>
  </body>
</html>
