<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EclipsesDev - Video Cloud Login</title>

    <link rel="icon" href="/assets/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="/assets/video-cloud/app.css">
</head>
<body>
    <nav class="nav-bar">
        <a href="/projects/panel"><button>Back</button></a>
        <a href="/"><button>Home</button></a>
    </nav>

    <div class="container auth-screen">
        <h1>Video Cloud Login</h1>
        <p class="auth-description">Sign in to access the Video Cloud project panel.</p>

        <form id="login-form" class="login-form">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button type="submit">Login</button>
            <p id="login-error" class="login-error" aria-live="polite"></p>
        </form>
    </div>

    <script src="/assets/video-cloud/auth.js"></script>
    <script src="/assets/video-cloud/app.js"></script>
</body>
</html>
