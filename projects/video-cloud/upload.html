<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EclipsesDev - Video Cloud</title>
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/projects/video-cloud/style.css">
</head>
<body>

  <nav class="nav-bar">
      <a href="/projects/video-cloud"><button>Back</button></a>
      <a href="/"><button>Home</button></a>
  </nav>

  <form id="upload-form">
    <h1 class="upload-title">Upload Video</h1>

    <input type="text" id="video-title" name="title" placeholder="Video Title" required>
    <input type="text" id="video-description" name="description" placeholder="Description">
    <input type="file" id="video-file" accept="video/mp4" required>

    <button type="submit">Upload Video</button>

    <progress id="progress-bar" max="100" value="0" style="display:none;"></progress>
  </form>

  <script>
    const form = document.getElementById("upload-form");
    const progressBar = document.getElementById("progress-bar");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const file = document.getElementById("video-file").files[0];
      if (!file) return alert("Select a video!");

      const title = document.getElementById("video-title").value.trim() || file.name;
      const description = document.getElementById("video-description").value.trim() || "";

      const formData = new FormData();
      formData.append("file", file);
      formData.append("title", title);
      formData.append("description", description);

      progressBar.style.display = "block";

      const xhr = new XMLHttpRequest();
      xhr.open("POST", "/video-api/upload-video", true);
      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          progressBar.value = Math.round((e.loaded / e.total) * 100);
        }
      };
      xhr.onload = () => {
        progressBar.value = 100;
        alert(xhr.responseText);
        progressBar.style.display = "none";
      };
      xhr.onerror = () => {
        alert("Upload failed!");
        progressBar.style.display = "none";
      };
      xhr.send(formData);
    });
  </script>
</body>
</html>
