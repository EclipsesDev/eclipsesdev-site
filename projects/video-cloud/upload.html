<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Video Cloud</title>

  <link rel="icon" href="/assets/img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/assets/video-cloud/app.css">
</head>
<body>

  <nav class="nav-bar">
      <a href="/projects/video-cloud"><button>Back</button></a>
      <a href="/"><button>Home</button></a>
  </nav>

  <form id="upload-form">
    <h1 class="upload-title">Upload Video</h1>

    <select id="upload-mode" name="upload-mode" aria-label="Upload mode">
      <option value="file">Upload File</option>
      <option value="url">Upload via URL</option>
    </select>

    <input type="text" id="video-title" name="title" placeholder="Video Title" required>
    <input type="text" id="video-description" name="description" placeholder="Description">
    <input type="file" id="video-file" accept="video/*" required>
    <input type="url" id="video-url" name="video-url" placeholder="https://cdn.discordapp.com/..." style="display:none;">

    <button type="submit">Upload Video</button>

    <progress id="progress-bar" max="100" value="0" style="display:none;"></progress>
  </form>

  <script src="/assets/video-cloud/upload.js"></script>
</body>
</html>
