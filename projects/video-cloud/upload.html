<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EclipsesDev - Video Cloud</title>

  <link rel="stylesheet" href="/assets/style.css">
  <link rel="stylesheet" href="/projects/video-cloud/style.css">
</head>
<body>
  <h1 class="upload-title">Upload Video</h1>

  <form id="upload-form">
    <input type="text" id="video-title" name="title" placeholder="Video Title" required>
    <input type="text" id="video-description" name="description" placeholder="Description">
    <input type="file" id="video-file" accept="video/mp4" required>
    <button type="submit">Upload Video</button>
  </form>

  <progress id="progress-bar" value="0" max="100" style="display:none; width: 100%; margin-top: 10px;"></progress>

  <script src="/projects/video-cloud/auth.js"></script>
  <script>
  const form = document.getElementById("upload-form");
  const progressBar = document.getElementById("progress-bar");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const fileInput = document.getElementById("video-file");
    const titleInput = document.getElementById("video-title");
    const descriptionInput = document.getElementById("video-description");

    const file = fileInput.files[0];
    if (!file) return alert("Select a video!");

    const isAuthed = await VideoCloudAuth.isAuthenticated();
    if (!isAuthed) {
      await VideoCloudAuth.requireAuth();
      return;
    }

    try {
      const res = await fetch("/video-api/upload-url", { method: "POST", credentials: "include" });
      const { uploadUrl, filename } = await res.json();

      progressBar.style.display = "block";
      progressBar.value = 0;

      await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("PUT", uploadUrl);
        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            progressBar.value = Math.round((e.loaded / e.total) * 100);
          }
        };
        xhr.onload = () => {
          if (xhr.status >= 200 && xhr.status < 300) {
            progressBar.value = 100;
            resolve();
          } else {
            reject(new Error("Upload failed with status " + xhr.status));
          }
        };
        xhr.onerror = () => reject(new Error("Upload failed due to network error"));
        xhr.send(file);
      });

      await fetch("/video-api/save-video", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({
          title: titleInput.value.trim() || file.name,
          description: descriptionInput.value.trim() || "",
          filename
        })
      });

      alert("Upload complete!");
      progressBar.style.display = "none";
      form.reset();
    } catch (err) {
      alert(err.message);
      progressBar.style.display = "none";
    }
  });
  </script>
</body>
</html>
