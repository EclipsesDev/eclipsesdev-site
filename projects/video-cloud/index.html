<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EclipsesDev - Video Cloud</title>
    
    <link rel="icon" href="/assets/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="/assets/video-cloud/player.css">
    <link rel="stylesheet" href="/assets/video-cloud/app.css">
</head>
<body>

    <nav class="nav-bar">
        <a href="/projects/project-panel"><button>Back</button></a>
        <a href="/"><button>Home</button></a>
        <a href="/projects/video-cloud/upload"><button>Upload</button></a>
        <button id="logout-btn">Logout</button>
    </nav>

    <div class="container">
        <h1>Video Cloud</h1>
        <p id="session-info" class="session-info"></p>
        <div id="video-grid"></div>
    </div>

    <div class="video-lightbox" id="video-lightbox">
        <div class="video-player-shell">
            <video id="video-player" playsinline webkit-playsinline></video>

            <div id="video-overlay">
                <button id="video-play-toggle" type="button" aria-label="Play or pause video">
                    <img id="video-play-icon" class="video-icon video-icon--play" src="/assets/img/Play.png" alt="Play">
                </button>
            </div>

            <div id="video-controls">
                <div id="video-progress">
                    <div id="video-progress-bar"></div>
                </div>
                <button id="video-mute" type="button" aria-label="Toggle mute">
                    <img id="video-mute-icon" class="video-icon video-icon--control" src="/assets/svg/unmute.svg" alt="Unmuted">
                </button>
                <span id="video-time">0:00 / 0:00</span>
                <button id="video-fullscreen" type="button" aria-label="Toggle fullscreen">
                    <img id="video-fullscreen-icon" class="video-icon video-icon--control" src="/assets/svg/maximize.svg" alt="Enter fullscreen">
                </button>
            </div>
        </div>

        <button id="video-close" type="button" aria-label="Close video">
            <img id="video-close-icon" class="video-icon video-icon--close" src="/assets/svg/close.svg" alt="Close">
        </button>
    </div>

    <script src="/assets/video-cloud/player.js"></script>
    <script src="/assets/video-cloud/auth.js"></script>
    <script src="/assets/video-cloud/app.js"></script>
</body>
</html>
