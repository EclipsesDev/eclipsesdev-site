<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EclipsesDev - Video Cloud</title>
    
    <link rel="icon" href="/assets/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="/projects/video-cloud/style.css">
</head>
<body>
    <!-- Nav Bar -->
    <nav class="nav-bar">
        <a href="/projects/project-panel"><button>Back</button></a>
        <a href="/"><button>Home</button></a>
        <button id="logout-btn" type="button">Logout</button>
    </nav>

    <div class="container">
        <h1>Video Cloud</h1>
        <p id="session-info" class="session-info"></p>

        <div class="video-grid">
            <div class="video-card">
                <img src="/projects/video-cloud/thumb1.png" alt="Video 1">
                <button onclick="playVideo(1)">Play</button>
            </div>

            <div class="video-card">
                <img src="/projects/video-cloud/thumb2.png" alt="Video 2">
                <button onclick="playVideo(2)">Play</button>
            </div>
        </div>
    </div>

    <script src="/projects/video-cloud/auth.js"></script>
    <script src="/projects/video-cloud/script.js"></script>
</body>
</html>
