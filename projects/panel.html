<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EclipsesDev - Projects</title>

    <link rel="icon" href="/assets/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="/assets/projects/app.css">
</head>
    <body>

    <div class="container">

        <!-- Nav Bar -->
        <nav class="nav-bar">
            <a href="/" class="nav-link"><button>Home</button></a>
            <a href="/changelog" class="nav-link"><button>Changelog</button></a>
            <a href="/projects/panel" class="nav-link"><button>Projects</button></a>
            <a href="/about" class="nav-link"><button class="active">About</button></a>
        </nav>

        <h1 style="text-align:center;margin-top:40px;">Projects</h1>

        <div class="projects-container">
            <!-- Typing Test -->
            <div class="project-card" onclick="openProject('typing-test')">
                <img src="/assets/svg/javascript.svg" type="image/x-icon" alt="Typing Test" class="project-icon">
                <div class="project-title">Typing Test</div>
                <div class="project-desc">Speed typing practice with live WPM stats</div>
            </div>

            <!-- Video Cloud -->
            <div class="project-card" onclick="openProject('video-cloud')">
                <img src="/assets/svg/cloudflare.svg" type="image/x-icon" alt="Video Cloud" class="project-icon">
                <div class="project-title">Video Cloud</div>
                <div class="project-desc">Cloud based video storage</div>
            </div>

            <!-- Eclipse Convert -->
            <div class="project-card" onclick="openProject('eclipse-convert')">
                <img src="/assets/img/EclipsesConvert.png" type="image/x-icon" alt="Eclipse Convert" class="project-icon">
                <div class="project-title">Eclipse Convert</div>
                <div class="project-desc">Fast & Lightweight currency conversion browser extension</div>
            </div>
        </div>

    </div>

    <!-- Script Section -->
    <script src="/assets/projects/app.js"></script>
    </body>
</html>
