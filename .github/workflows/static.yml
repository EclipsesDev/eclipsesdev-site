# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare dist
        run: |
          mkdir -p dist
          rsync -a --delete --exclude ".git" --exclude ".github" --exclude "node_modules" --exclude "dist" ./ dist/
      - name: Mangle selectors
        run: |
          node tools/mangle-selectors.js dist
      - name: Install minifiers
        run: |
          npm install -g html-minifier-terser@7.2.0 clean-css-cli@5.6.3 terser@5.27.2
      - name: Minify HTML
        run: |
          find dist -type f -name "*.html" -print0 | while IFS= read -r -d '' f; do
            html-minifier-terser \
              --collapse-whitespace \
              --remove-comments \
              --remove-redundant-attributes \
              --remove-script-type-attributes \
              --remove-style-link-type-attributes \
              --minify-css true \
              --minify-js true \
              -o "$f" "$f"
          done
      - name: Minify CSS
        run: |
          find dist -type f -name "*.css" ! -name "*.min.css" -print0 | while IFS= read -r -d '' f; do
            cleancss -O2 -o "$f" "$f"
          done
      - name: Minify JS
        run: |
          find dist -type f -name "*.js" ! -name "*.min.js" -print0 | while IFS= read -r -d '' f; do
            terser "$f" -o "$f" --compress --mangle
          done
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: 'dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
